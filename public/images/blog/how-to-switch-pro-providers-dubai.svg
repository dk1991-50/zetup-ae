<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081B2E"/>
      <stop offset="50%" style="stop-color:#0F2B46"/>
      <stop offset="100%" style="stop-color:#0A2A4A"/>
    </linearGradient>
    <radialGradient id="orb" cx="85%" cy="50%" r="38%">
      <stop offset="0%" style="stop-color:#2E9B87;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2E9B87;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#orb)"/>
  <!-- Arrow-like chevron pattern -->
  <g opacity="0.03">
    <polyline points="800,100 850,200 800,300" stroke="white" stroke-width="1" fill="none"/>
    <polyline points="860,100 910,200 860,300" stroke="white" stroke-width="1" fill="none"/>
    <polyline points="920,100 970,200 920,300" stroke="white" stroke-width="1" fill="none"/>
    <polyline points="980,100 1030,200 980,300" stroke="white" stroke-width="1" fill="none"/>
    <polyline points="1040,100 1090,200 1040,300" stroke="white" stroke-width="1" fill="none"/>
  </g>
  <rect x="80" y="240" width="50" height="3" rx="1.5" fill="#2E9B87"/>
  <text x="80" y="220" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="48" fill="white">Switching PRO Providers</text>
  <text x="80" y="290" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="20" fill="#94A3B8">ZETUP Corporate Services</text>
  <rect x="0" y="0" width="1200" height="2" fill="#2E9B87" opacity="0.3"/>
  <rect x="0" y="398" width="1200" height="2" fill="#2E9B87" opacity="0.3"/>
</svg>