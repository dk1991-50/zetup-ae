<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081B2E"/>
      <stop offset="50%" style="stop-color:#0F2B46"/>
      <stop offset="100%" style="stop-color:#0A2A4A"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="15%" r="40%">
      <stop offset="0%" style="stop-color:#2E9B87;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#2E9B87;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#orb)"/>
  <!-- Cross-hatch pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="400" y2="400" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="600" y2="400" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="800" y2="400" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="1000" y2="400" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="0" y2="400" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="400" y2="400" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="600" y2="400" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="800" y2="400" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1000" y2="400" stroke="white" stroke-width="1"/>
  </g>
  <rect x="80" y="240" width="50" height="3" rx="1.5" fill="#2E9B87"/>
  <text x="80" y="220" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="56" fill="white">Document Clearing</text>
  <text x="80" y="290" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="20" fill="#94A3B8">ZETUP Corporate Services</text>
  <rect x="0" y="0" width="1200" height="2" fill="#2E9B87" opacity="0.3"/>
  <rect x="0" y="398" width="1200" height="2" fill="#2E9B87" opacity="0.3"/>
</svg>